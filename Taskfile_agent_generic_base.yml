---
# https://taskfile.dev
version: '3'
includes:
  agent:
    taskfile: ./agent_generic_base/Taskfile.yml
    dir: ./agent_generic_base
  execenv:
    taskfile: ./Taskfile_execution_env.yml
    dir: .
    vars:
      COMPONENTS: agent_generic_base infra
  infra:
    taskfile: ./infra/Taskfile.yml
    dir: ./infra
    internal: true
tasks:
  default:
    desc: "🗒️ Show all available tasks"
    cmds:
      - task --list
    silent: true
  install:
    desc: "🏗️ [agent_generic_base] Install and setup the agent and infra environments"
    cmds:
      - echo "Updating agent environment"
      - task: agent:req
      - echo "Updating infra environment"
      - task: infra:req
    silent: true
    aliases:
      - setup
      - req
  update:
    desc: "🏗️ [agent_generic_base] Update all dependencies for the agent and infra (refresh uv locks)"
    cmds:
      - echo "Updating dependencies for an agent"
      - task: agent:update
      - echo "Updating infra dependencies"
      - task: infra:update
    silent: true
    aliases:
      - update-all
  build:
    desc: "🔵 [agent_generic_base] Run Pulumi up in [BUILD] mode"
    cmds:
      - task: infra:build
    silent: true
  deploy:
    desc: "🟢 [agent_generic_base] Run Pulumi up in [DEPLOY] mode"
    cmds:
      - task: infra:deploy
    silent: true
  refresh:
    desc: "⚪️ [agent_generic_base] Run Pulumi refresh"
    cmds:
      - task: infra:refresh
    silent: true
  destroy:
    desc: "🔴 [agent_generic_base] Run Pulumi destroy"
    cmds:
      - task: infra:destroy
    silent: true
